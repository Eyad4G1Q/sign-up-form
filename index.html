<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>
    <div id="background-imaged">
        <div id="containers">
            <img src="odin-lined.png" alt="odin-logo">
            ODIN
        </div>
        <div id="credit">
            <p>this image was taken by <a href="https://unsplash.com/@haliewestphoto">Halie West</a></p>
        </div>

    </div>
    <div id="formed">
        
        <form action="#" method="post" id="sign-up">
            <legend>This is not a real online service! You know you need something like this in your life to helo you realize your deepest dreams. Sign up <em>now</em> to get started</legend>
            <legend>You <em>know</em> you want to.</legend>
            <fieldset><p><label for="name">FIRST NAME</label>
                <input type="text" name="name" id="name">
            </p>
            <p>
                <label for="last-name">LAST NAME</label>
                <input type="text" name="last-name" id="last-name">
            </p>    
            <p>
                <label for="email">EMAIL</label>
                <input type="email" name="email" id="email">
            </p>
            <p>
                <label for="phone">PHONE NUMBER</label>
                <input type="tel" name="phone" id="phone">
            </p>
            <p>
                <label for="pass">password</label>
                <input type="password" name="pass" id="pass" required>
            
            </p>
            <p>
                <label for="confirm-pass">confirm password</label>
                <input type="password" name="confirm-pass" id="confirm-pass pass" required>
            </p></fieldset>
            <button type="submit">Create Account</button>
            <p>Already have an account? <a href="#">Log in</a></p>
        </form>
    </div>
    
</body>
</html>
